config:
  width: 300

layout:
  type: container
  style:
    display: flex
    flexDirection: column
    alignItems: center
    justifyContent: flexStart
    backgroundColor: "#1e1e2e"
    width: 300
    height: 100%
    paddingTop: 16
    rowGap: 8
    borderTopWidth: 1
    borderRightWidth: 1
    borderBottomWidth: 1
    borderLeftWidth: 1
    borderStyle: solid
    borderColor: "#00ff00"
  children:
    - type: "@~/.config/costae/modules/workspaces"
